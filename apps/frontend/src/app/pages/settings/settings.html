<div class="page-container">
  <h1 class="page-title">Settings</h1>

  @if (loading()) {
    <div class="spinner-center"><mat-spinner diameter="48" /></div>
  } @else {
    <!-- ─── Coros Account ──────────────────────────────────────────────── -->
    <mat-card class="settings-card">
      <mat-card-header><mat-card-title>Coros Account</mat-card-title></mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Coros Email</mat-label>
          <input matInput [(ngModel)]="settingsForm.corosEmail" type="email" placeholder="you@example.com" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Coros Password</mat-label>
          <input matInput [(ngModel)]="settingsForm.corosPassword" type="password" placeholder="Leave blank to keep existing" />
        </mat-form-field>
      </mat-card-content>
      <mat-card-actions>
        <button mat-flat-button color="primary" (click)="saveSettings()" [disabled]="saving()">
          @if (saving()) { <mat-spinner diameter="18" /> } @else { Save Account }
        </button>
      </mat-card-actions>
    </mat-card>

    <!-- ─── Appearance ─────────────────────────────────────────────────── -->
    <mat-card class="settings-card">
      <mat-card-header><mat-card-title>Appearance</mat-card-title></mat-card-header>
      <mat-card-content class="theme-row">
        <mat-button-toggle-group
          [value]="themeService.theme()"
          (change)="onThemeChange($event.value)"
          aria-label="Theme">
          <mat-button-toggle value="light">
            <mat-icon>light_mode</mat-icon>
            Light
          </mat-button-toggle>
          <mat-button-toggle value="dark">
            <mat-icon>dark_mode</mat-icon>
            Dark
          </mat-button-toggle>
          <mat-button-toggle value="system">
            <mat-icon>computer</mat-icon>
            System
          </mat-button-toggle>
        </mat-button-toggle-group>
      </mat-card-content>
    </mat-card>

    <!-- ─── Units ──────────────────────────────────────────────────────── -->
    <mat-card class="settings-card">
      <mat-card-header><mat-card-title>Units</mat-card-title></mat-card-header>
      <mat-card-content class="units-row">
        <span class="units-label">Kilometers &amp; Meters</span>
        <mat-slide-toggle
          [checked]="imperialToggle"
          (change)="onUnitToggle($event.checked)"
          color="primary">
        </mat-slide-toggle>
        <span class="units-label">Miles &amp; Feet</span>
      </mat-card-content>
    </mat-card>

    <mat-divider />

    <!-- ─── Manual Controls ───────────────────────────────────────────── -->
    <mat-card class="settings-card" style="margin-top: 24px;">
      <mat-card-header><mat-card-title>Manual Controls</mat-card-title></mat-card-header>
      <mat-card-content class="controls-row">
        <button mat-stroked-button (click)="sync()" [disabled]="syncing()">
          @if (syncing()) { <mat-spinner diameter="18" /> } @else { <mat-icon>sync</mat-icon> }
          Sync Activities
        </button>
        <button mat-stroked-button (click)="generate()" [disabled]="generating()">
          @if (generating()) { <mat-spinner diameter="18" /> } @else { <mat-icon>auto_awesome</mat-icon> }
          Generate AI Plan
        </button>
        <button mat-flat-button color="accent" (click)="push()" [disabled]="pushing()">
          @if (pushing()) { <mat-spinner diameter="18" /> } @else { <mat-icon>watch</mat-icon> }
          Push to Watch
        </button>
      </mat-card-content>
    </mat-card>
  }
</div>
